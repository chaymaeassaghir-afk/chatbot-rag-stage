
services:
  postgres:
    image: postgres:16

    container_name: postgres-rag

    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-rag

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage  

  

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.6.18
    container_name: open-webui

    ports:
      - "3000:8080"

    environment:
      ENABLE_LOGIN_FORM: "false"
      ENABLE_OAUTH_SIGNUP: "true"

      WEBUI_URL: "http://localhost:3000"

      OAUTH_PROVIDER_NAME: "Keycloak"

      OAUTH_CLIENT_ID: "open-webui"
      OAUTH_CLIENT_SECRET: "pdWqbiOxEvlAyyQilSYsL3Lz9kr4hoLj"

      OPENID_PROVIDER_URL: "http://keycloak.local:8080/realms/rag-stage/.well-known/openid-configuration"

    extra_hosts:
      - "host.docker.internal:host-gateway"
      

    volumes:
    - open_webui_data:/app/backend/data  

    restart: unless-stopped
    depends_on:
      - keycloak

  minio:
    image: minio/minio:latest
    container_name: minio-rag

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data  

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak

    command: start-dev

    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: password

      KC_HOSTNAME: keycloak.local
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8080:8080"

    networks:
      default:
        aliases:
          - keycloak.local  

    depends_on:
      - postgres

    restart: unless-stopped

    volumes:
      - keycloak_data:/opt/keycloak/data    

volumes:
  postgres_data:
  qdrant_data:
  keycloak_data:
  open_webui_data:
  minio_data: