
services:
  postgres:
    image: postgres:16

    container_name: postgres-rag

    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-rag

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage  

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
    command: start-dev
    ports:
      - "8081:8080"
    restart: unless-stopped 
    volumes:
    - keycloak_data:/opt/keycloak/data 

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui

    ports:
      - "3000:8080"

    environment:
      ENABLE_LOGIN_FORM: "false"
      ENABLE_OAUTH_SIGNUP: "true"

      OAUTH_PROVIDER_NAME: Keycloak

      OPENID_PROVIDER_URL: http://keycloak:8080/realms/rag-stage/.well-known/openid-configuration

      OAUTH_CLIENT_ID: open-webui
      OAUTH_CLIENT_SECRET: TON_NOUVEAU_SECRET

      OAUTH_SCOPES: openid profile email

      OAUTH_REDIRECT_URI: http://localhost:3000/oauth/oidc/callback

      WEBUI_SECRET_KEY: une-cle-secrete

    volumes:
      - open_webui_data:/app/backend/data

    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  keycloak_data:
  open_webui_data: